    <button onclick="testPrime()">PRIME</button>
    <button onclick="testAppleTV()">APPLE TV</button>
    <button onclick="testNetflix()">NETFLIX</button>
    <div style="color: white" id="debug">Debug:<br /></div>

    <script>
      // window.location.href = 'http://192.168.2.252:5173/';

      function log(message) {
        if (document.getElementById('debug') === null) {
          return;
        }
        document.getElementById('debug').innerHTML += message + '<br/>';
      }

      function streamOnWebOsTest(name, url) {
        log(`opening ${name} at ${url} <br/>`);

        webOS.service.request('luna://com.webos.applicationManager', {
          method: 'launch',
          parameters: {
            id: 'netflix',
            params: {
              contentTarget: url,
            },
          },
          onSuccess: (res) => {
            log('Open success. ', res);
          },
          onFailure: (res) => {
            log('Open fail. ', res);
          },
        });
      }

      function streamOnWebOs(id, contentTarget) {
        log(`opening ${id} with ${contentTarget} <br/>`);

        webOS.service.request('luna://com.webos.applicationManager', {
          method: 'launch',
          parameters: {
            id,
            params: {
              contentTarget,
            },
          },
          onSuccess: (res) => {
            log('Open success. ', res);
          },
          onFailure: (res) => {
            log('Open fail. ', res);
          },
        });
      }

      function testFunction() {
        streamOnWebOsTest(
          'netflix',
          'https://www.netflix.com/watch/80013762',
        );
      }

      function testPrime() {
        streamOnWebOs(
          'amazon',
          'amzn1.dv.gti.fe649fbe-a127-4599-8efc-e7c6ff5f8a5c',
        );
      }

      function testAppleTV() {
        streamOnWebOs(
          'com.apple.appletv',
          'https://tv.apple.com/nl/episode/preparing-to-live/umc.cmc.12ibmbmz39qv1p882hca0qdah?showId=umc.cmc.5983fipzqbicvrve6jdfep4x3\u0026playableId=tvs.sbd.4000%3AVFOUN0560102',
        );
      }

      function testNetflix() {
        streamOnWebOs(
          'netflix',
          '-Q m=http%3A%2F%2Fapi-global.netflix.com%2Fcatalog%2Ftitles%2Fmovies%2F80057281',
        );
      }
    </script>
